<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --c-black: #1A1A1A;
    --c-red: #E63956;
    --c-yellow: #FFD400;
    --c-white: #FFFFFF;
    --c-gold: #FFE082;
    --hacker-void: #07110D;
    --hacker-paper: #EAF4EC;
    --hacker-signal: #00C46A;
    --footer-h: clamp(42px, 7vh, 72px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  [hidden] { display: none !important; }

  body[data-theme="black"] {
    --bg: var(--c-black); --fg: var(--c-white);
    --acc-bg: var(--c-red); --acc-fg: var(--c-white); --hl: var(--c-red);
  }
  body[data-theme="red"] {
    --bg: var(--c-red); --fg: var(--c-white);
    --acc-bg: var(--c-black); --acc-fg: var(--c-white); --hl: var(--c-gold);
  }
  body[data-theme="yellow"] {
    --bg: var(--c-yellow); --fg: var(--c-black);
    --acc-bg: var(--c-black); --acc-fg: var(--c-white); --hl: var(--c-red);
  }
  body[data-theme="hacker"],
  body[data-theme="cyber"] {
    --bg: var(--hacker-paper); --fg: var(--hacker-void);
    --acc-bg: var(--hacker-void); --acc-fg: var(--hacker-paper); --hl: var(--hacker-signal);
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Avenir Next Condensed", "DIN Condensed", "Helvetica Neue", "Arial Black", "PingFang SC", "Heiti SC", -apple-system, sans-serif;
    font-weight: 850;
    letter-spacing: -.045em;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage { position: fixed; inset: 0; overflow: hidden; }
  .slide {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: clamp(28px, 6vmin, 96px) clamp(30px, 7vw, 112px) calc(var(--footer-h) + clamp(18px, 3.5vmin, 54px));
    color: var(--fg);
    background: var(--bg);
    isolation: isolate;
  }
  .slide.active { display: flex; }
  .slide[data-cover="true"],
  .slide[data-emphasis="true"] { color: var(--acc-fg); background: var(--acc-bg); }
  .slide[data-cover="true"] {
    align-items: flex-start;
    justify-content: flex-end;
    padding-bottom: clamp(100px, 18vh, 230px);
  }

  .fit-box {
    position: relative;
    z-index: 2;
    max-width: 100%;
    max-height: 100%;
    transform-origin: center center;
  }

  .lines {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: .14em;
    max-width: 84vw;
    line-height: 1.03;
  }
  .line { max-width: 100%; white-space: nowrap; text-align: left; }
  .line[data-indent="1"] { padding-left: clamp(22px, 4.5vw, 82px); }
  .line[data-indent="2"] { padding-left: clamp(44px, 9vw, 156px); }
  .hl { color: var(--hl); }
  [data-emphasis="true"] .hl { color: inherit; }

  .slide[data-len="single"] .lines { font-size: clamp(172px, 56vmin, 800px); }
  .slide[data-len="short"] .lines { font-size: clamp(124px, 34vmin, 520px); }
  .slide[data-len="medium"] .lines { font-size: clamp(80px, 20vmin, 316px); }
  .slide[data-len="long"] .lines { font-size: clamp(52px, 12vmin, 194px); }
  .slide[data-len="xlong"] .lines { font-size: clamp(34px, 7vmin, 112px); }
  .slide[data-len="xlong"] .line,
  .slide[data-quote="true"] .line {
    white-space: normal;
    overflow-wrap: break-word;
    word-break: normal;
    text-wrap: pretty;
  }
  .slide[data-cover="true"] .lines {
    max-width: 76vw;
    font-size: clamp(96px, 22vmin, 350px);
    line-height: .88;
    letter-spacing: -.07em;
  }
  .slide[data-title="true"] .lines {
    max-width: 79vw;
    padding-top: clamp(12px, 2vmin, 34px);
    border-top: clamp(6px, .7vmin, 12px) solid var(--hl);
  }
  .slide[data-depth="3"] .lines,
  .slide[data-depth="4"] .lines,
  .slide[data-depth="5"] .lines { font-size: clamp(46px, 10.5vmin, 172px); }
  .slide[data-quote="true"] .lines {
    max-width: 76vw;
    padding: clamp(22px, 3.5vmin, 56px) clamp(22px, 3.2vmin, 52px);
    border-top: clamp(7px, .8vmin, 13px) solid var(--hl);
    border-left: 1px solid currentColor;
    font-size: clamp(42px, 9vmin, 142px);
  }

  .slide[data-line-count="2"] .lines,
  .slide[data-line-count="3"] .lines,
  .slide[data-line-count="4"] .lines {
    width: min(82vw, 1580px);
    max-width: 100%;
    display: grid;
    gap: clamp(12px, 1.8vmin, 28px);
    align-items: stretch;
    line-height: 1.13;
    font-size: var(--multi-size);
    letter-spacing: -.025em;
  }
  .slide[data-line-count="2"] .lines { --multi-size: clamp(34px, 6.2vmin, 98px); }
  .slide[data-line-count="3"] .lines { --multi-size: clamp(28px, 5.1vmin, 80px); }
  .slide[data-line-count="4"] .lines { --multi-size: clamp(24px, 4.2vmin, 66px); }
  .slide[data-density="dense"] .lines { --multi-size: clamp(23px, 3.7vmin, 58px); }
  .slide[data-layout="duo"] .lines { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .slide[data-layout="triptych"] .lines { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .slide[data-layout="matrix"] .lines { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-auto-rows: 1fr; }
  .slide[data-layout="rows"] .lines { grid-template-columns: minmax(0, 1fr); }
  .slide[data-line-count="2"] .line,
  .slide[data-line-count="3"] .line,
  .slide[data-line-count="4"] .line {
    --indent-extra: 0px;
    position: relative;
    min-width: 0;
    min-height: 0;
    max-width: none;
    padding: clamp(14px, 1.9vmin, 28px);
    padding-left: calc(clamp(14px, 1.9vmin, 28px) + var(--indent-extra));
    white-space: normal;
    overflow-wrap: break-word;
    word-break: normal;
    text-wrap: pretty;
    border-top: 1px solid currentColor;
  }
  .slide[data-line-count] .line[data-indent="1"] { --indent-extra: clamp(18px, 3vw, 54px); }
  .slide[data-line-count] .line[data-indent="2"] { --indent-extra: clamp(36px, 6vw, 104px); }

  .pre-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 88vw;
    padding: clamp(20px, 3.2vmin, 54px);
    border: 1px solid currentColor;
  }
  .pre-title {
    margin-bottom: .7em;
    font: 650 clamp(12px, 1.6vmin, 22px) "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
    letter-spacing: .08em;
  }
  .pre-wrap pre {
    font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Monaco, monospace;
    font-size: clamp(20px, 3.6vmin, 70px);
    font-weight: 650;
    line-height: 1.12;
    letter-spacing: 0;
    white-space: pre;
  }

  .table-wrap { width: min(82vw, 1520px); }
  .table-caption {
    display: inline-block;
    margin-bottom: clamp(18px, 3vmin, 46px);
    padding: .34em .54em;
    color: var(--acc-fg);
    background: var(--acc-bg);
    font: 760 clamp(16px, 2.3vmin, 34px) "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
    letter-spacing: .08em;
  }
  table { width: 100%; border-collapse: collapse; font-size: clamp(22px, 4vmin, 62px); line-height: 1.08; letter-spacing: -.025em; }
  th, td { padding: .38em .46em; text-align: left; border-bottom: 1px solid currentColor; }
  th { color: var(--acc-fg); background: var(--acc-bg); font-size: .72em; letter-spacing: .02em; }

  .math {
    display: inline-block;
    font-family: "STIX Two Math", "Times New Roman", "Songti SC", serif;
    font-weight: 620;
    letter-spacing: .01em;
    white-space: nowrap;
  }
  .math-display { display: block; width: 100%; text-align: center; font-size: 1.12em; border-bottom: .08em solid var(--hl); }
  .math sup, .math sub { font-size: .58em; line-height: 0; position: relative; }
  .math sup { top: -.36em; }
  .math sub { bottom: -.08em; }

  .deck-footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: var(--footer-h);
    z-index: 30;
    pointer-events: none;
    color: var(--fg);
    font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Monaco, monospace;
    font-size: clamp(11px, 1.15vmin, 15px);
    font-weight: 650;
    letter-spacing: .12em;
  }
  .pager { position: absolute; left: 50%; bottom: clamp(13px, 2.4vh, 27px); transform: translateX(-50%); }
  .meta-footer { position: absolute; right: clamp(22px, 4vw, 64px); bottom: clamp(13px, 2.4vh, 27px); }
  body[data-current="emphasis"] .deck-footer { color: var(--acc-fg); }

  body[data-theme="hacker"] .slide,
  body[data-theme="cyber"] .slide {
    padding-left: clamp(58px, 12vw, 210px);
    background:
      linear-gradient(108deg, rgba(0,196,106,.055), transparent 29%),
      var(--hacker-paper);
  }
  body[data-theme="hacker"] .slide::before,
  body[data-theme="cyber"] .slide::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background:
      repeating-linear-gradient(0deg, transparent 0 5px, rgba(7,17,13,.025) 5px 6px),
      repeating-linear-gradient(90deg, rgba(7,17,13,.04) 0 1px, transparent 1px 8vw),
      repeating-linear-gradient(0deg, rgba(7,17,13,.035) 0 1px, transparent 1px 10vh);
    -webkit-mask-image: linear-gradient(90deg, rgba(7,17,13,.22), transparent 82%);
    mask-image: linear-gradient(90deg, rgba(7,17,13,.22), transparent 82%);
  }
  body[data-theme="hacker"] .slide::after,
  body[data-theme="cyber"] .slide::after {
    content: "";
    position: absolute;
    left: clamp(28px, 6.2vw, 112px);
    top: clamp(26px, 7vh, 96px);
    bottom: calc(var(--footer-h) + clamp(18px, 3vh, 42px));
    width: clamp(5px, .55vw, 10px);
    z-index: -1;
    background: linear-gradient(to bottom, var(--hacker-signal) 0 19%, transparent 19% 24%, var(--hacker-signal) 24% 62%, transparent 62% 79%, var(--hacker-signal) 79% 100%);
  }
  body[data-theme="hacker"] .slide[data-cover="true"],
  body[data-theme="hacker"] .slide[data-emphasis="true"],
  body[data-theme="cyber"] .slide[data-cover="true"],
  body[data-theme="cyber"] .slide[data-emphasis="true"] {
    color: var(--hacker-paper);
    background: linear-gradient(118deg, rgba(0,196,106,.14), transparent 34%), var(--hacker-void);
  }
  body[data-theme="hacker"] .slide[data-cover="true"]::before,
  body[data-theme="hacker"] .slide[data-emphasis="true"]::before,
  body[data-theme="cyber"] .slide[data-cover="true"]::before,
  body[data-theme="cyber"] .slide[data-emphasis="true"]::before {
    background:
      repeating-linear-gradient(0deg, transparent 0 5px, rgba(234,244,236,.025) 5px 6px),
      repeating-linear-gradient(90deg, rgba(0,196,106,.07) 0 1px, transparent 1px 8vw),
      repeating-linear-gradient(0deg, rgba(0,196,106,.055) 0 1px, transparent 1px 10vh);
  }
  body[data-theme="hacker"] .slide[data-cover="true"] .line::after,
  body[data-theme="cyber"] .slide[data-cover="true"] .line::after {
    content: "";
    display: inline-block;
    width: .18em;
    height: .18em;
    margin-left: .14em;
    background: var(--hacker-signal);
    vertical-align: .08em;
  }
  body[data-theme="hacker"] .slide[data-line-count="2"] .line,
  body[data-theme="hacker"] .slide[data-line-count="3"] .line,
  body[data-theme="hacker"] .slide[data-line-count="4"] .line,
  body[data-theme="cyber"] .slide[data-line-count="2"] .line,
  body[data-theme="cyber"] .slide[data-line-count="3"] .line,
  body[data-theme="cyber"] .slide[data-line-count="4"] .line {
    border: 1px solid rgba(7,17,13,.20);
    border-left: clamp(4px, .45vmin, 7px) solid var(--hacker-signal);
    background: linear-gradient(90deg, var(--hacker-signal) 0 17%, transparent 17%) top left / 100% 2px no-repeat, rgba(7,17,13,.028);
    clip-path: polygon(0 0, calc(100% - clamp(12px, 1.5vmin, 24px)) 0, 100% clamp(12px, 1.5vmin, 24px), 100% 100%, 0 100%);
  }
  body[data-theme="hacker"] .pre-wrap,
  body[data-theme="cyber"] .pre-wrap {
    color: var(--hacker-paper);
    background: var(--hacker-void);
    border-color: rgba(0,196,106,.5);
    border-left: clamp(7px, .8vmin, 13px) solid var(--hacker-signal);
    clip-path: polygon(0 0, calc(100% - clamp(20px, 2.5vmin, 44px)) 0, 100% clamp(20px, 2.5vmin, 44px), 100% 100%, 0 100%);
  }
  body[data-theme="hacker"] .table-caption,
  body[data-theme="cyber"] .table-caption { color: var(--hacker-void); background: var(--hacker-signal); }
  body[data-theme="hacker"] th,
  body[data-theme="cyber"] th { color: var(--hacker-paper); background: var(--hacker-void); }

  @media (max-aspect-ratio: 1/1) {
    .slide { padding-left: clamp(42px, 11vw, 96px); padding-right: 7vw; }
    .lines { max-width: 82vw; }
    .slide[data-layout="duo"] .lines,
    .slide[data-layout="triptych"] .lines,
    .slide[data-layout="matrix"] .lines { grid-template-columns: minmax(0, 1fr); }
    .slide[data-len="long"] .line,
    .slide[data-len="xlong"] .line { white-space: normal; overflow-wrap: break-word; word-break: normal; }
    .table-wrap { width: 86vw; }
  }

  @media (max-height: 620px) {
    :root { --footer-h: 40px; }
    .slide { padding-top: 24px; padding-bottom: 58px; }
    .pager, .meta-footer { bottom: 9px; }
  }
</style>
</head>
<body data-template-version="4.0.0" data-theme="{{THEME}}">
<main class="stage" id="stage"></main>
<footer class="deck-footer">
  <div class="pager" id="pager">01 / 01</div>
  <div class="meta-footer" id="metaFooter">{{SUBTITLE}}</div>
</footer>

<script>
  const RAW_SLIDES = {{SLIDES_JSON}};
  const stage = document.getElementById("stage");
  const pager = document.getElementById("pager");
  const metaFooter = document.getElementById("metaFooter");
  const body = document.body;

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function latexBody(raw) {
    let value = raw
      .replace(/\\cdot/g, "·")
      .replace(/\\times/g, "×")
      .replace(/\\propto/g, "∝")
      .replace(/\\alpha/g, "α")
      .replace(/\\beta/g, "β")
      .replace(/\\gamma/g, "γ");
    value = escapeHtml(value);
    value = value.replace(/\^\{([^{}]+)\}/g, "<sup>$1</sup>");
    value = value.replace(/\^([A-Za-z0-9αβγ+\-]+)/g, "<sup>$1</sup>");
    value = value.replace(/_\{([^{}]+)\}/g, "<sub>$1</sub>");
    value = value.replace(/_([A-Za-z0-9]+)/g, "<sub>$1</sub>");
    return value;
  }

  function renderMathAware(text) {
    const exactDisplay = text.trim().match(/^\$\$([\s\S]+)\$\$$/);
    const exactInline = text.trim().match(/^\$(?![\d?])([^$\n]+)\$$/);
    if (exactDisplay) return '<span class="math math-display">' + latexBody(exactDisplay[1]) + "</span>";
    if (exactInline) return '<span class="math math-display">' + latexBody(exactInline[1]) + "</span>";

    const pattern = /\$\$([\s\S]+?)\$\$|\$(?![\d?])([^$\n]+?)\$/g;
    let result = "";
    let cursor = 0;
    for (const match of text.matchAll(pattern)) {
      const at = match.index ?? 0;
      result += escapeHtml(text.slice(cursor, at));
      result += '<span class="math">' + latexBody(match[1] ?? match[2]) + "</span>";
      cursor = at + match[0].length;
    }
    result += escapeHtml(text.slice(cursor));
    return result;
  }

  function lineLength(line) {
    let count = 0;
    for (const chunk of line.chunks || []) {
      for (const char of chunk.t || "") {
        count += /[\u3000-\u30ff\u3400-\u9fff\uff00-\uffef]/.test(char) ? 1.8 : 1;
      }
    }
    return count;
  }

  function lengthTier(lines) {
    const max = Math.max(0, ...lines.map(lineLength)) + Math.max(0, lines.length - 1) * 4;
    if (max <= 2) return "single";
    if (max <= 6) return "short";
    if (max <= 14) return "medium";
    if (max <= 26) return "long";
    return "xlong";
  }

  function linesText(slide) {
    return (slide?.lines || []).map((line) => (line.chunks || []).map((chunk) => chunk.t || "").join("")).join("\n").trim();
  }

  function normalizeSlides(raw) {
    const slides = Array.isArray(raw) ? raw.slice() : [];
    const title = document.title.trim();
    if (slides[0]?.cover) return slides;
    if (slides[0] && linesText(slides[0]) === title) {
      slides[0] = { ...slides[0], cover: true, emphasis: true };
      return slides;
    }
    return [{ cover: true, emphasis: true, lines: [{ indent: 0, chunks: [{ t: title }] }], sourceIds: [] }, ...slides];
  }

  const SLIDES = normalizeSlides(RAW_SLIDES);

  SLIDES.forEach((slide) => {
    const element = document.createElement("section");
    element.className = "slide";
    if (slide.cover) element.dataset.cover = "true";
    if (slide.emphasis) element.dataset.emphasis = "true";
    if (slide.title) element.dataset.title = "true";
    if (slide.depth) element.dataset.depth = String(slide.depth);
    if (slide.quote) element.dataset.quote = "true";
    element.dataset.sourceIds = (slide.sourceIds || []).join(",");

    if (slide.pre != null) {
      const wrap = document.createElement("div");
      wrap.className = "pre-wrap fit-box";
      const inner = document.createElement("div");
      if (slide.preTitle) {
        const title = document.createElement("div");
        title.className = "pre-title";
        title.textContent = slide.preTitle;
        inner.appendChild(title);
      }
      const pre = document.createElement("pre");
      pre.textContent = slide.pre;
      inner.appendChild(pre);
      wrap.appendChild(inner);
      element.appendChild(wrap);
    } else if (slide.table) {
      const wrap = document.createElement("div");
      wrap.className = "table-wrap fit-box";
      if (slide.table.caption) {
        const caption = document.createElement("div");
        caption.className = "table-caption";
        caption.textContent = slide.table.caption;
        wrap.appendChild(caption);
      }
      const table = document.createElement("table");
      const hasHeader = slide.table.header === true;
      const tableHead = hasHeader ? document.createElement("thead") : null;
      const bodyRows = document.createElement("tbody");
      (slide.table.rows || []).forEach((row, rowIndex) => {
        const tr = document.createElement("tr");
        row.forEach((cell) => {
          const cellNode = document.createElement(hasHeader && rowIndex === 0 ? "th" : "td");
          cellNode.textContent = cell;
          tr.appendChild(cellNode);
        });
        if (hasHeader && rowIndex === 0) tableHead.appendChild(tr);
        else bodyRows.appendChild(tr);
      });
      if (tableHead) table.appendChild(tableHead);
      table.appendChild(bodyRows);
      wrap.appendChild(table);
      element.appendChild(wrap);
    } else if (slide.lines?.length) {
      const weights = slide.lines.map(lineLength);
      const lineCount = slide.lines.length;
      const maxWeight = Math.max(...weights);
      const totalWeight = weights.reduce((sum, value) => sum + value, 0);
      const density = maxWeight >= 45 || totalWeight >= 110 ? "dense" : maxWeight >= 24 || totalWeight >= 65 ? "medium" : "light";
      const layout = lineCount === 2
        ? (maxWeight >= 38 || totalWeight >= 90 ? "rows" : "duo")
        : lineCount === 3
          ? (maxWeight <= 18 && totalWeight <= 55 ? "triptych" : "rows")
          : lineCount === 4 ? "matrix" : "single";

      element.dataset.len = lengthTier(slide.lines);
      element.dataset.lineCount = String(lineCount);
      element.dataset.density = density;
      element.dataset.layout = layout;

      const lines = document.createElement("div");
      lines.className = "lines fit-box";
      slide.lines.forEach((line, lineIndex) => {
        const node = document.createElement("div");
        node.className = "line";
        node.dataset.indent = String(line.indent || 0);
        node.dataset.lineIndex = String(lineIndex + 1);
        node.dataset.weight = String(Math.round(weights[lineIndex]));
        if (line.align) node.style.textAlign = line.align;
        node.innerHTML = (line.chunks || []).map((chunk) => {
          const rendered = renderMathAware(chunk.t);
          return chunk.hl ? '<span class="hl">' + rendered + "</span>" : rendered;
        }).join("");
        lines.appendChild(node);
      });
      element.appendChild(lines);
    }

    stage.appendChild(element);
  });

  const slides = Array.from(stage.querySelectorAll(".slide"));
  let index = 0;

  function fitSlide(slide) {
    const box = slide.querySelector(".fit-box");
    if (!box) return { scale: 1, fits: true };
    box.style.transform = "none";
    const style = getComputedStyle(slide);
    const availableWidth = Math.max(1, slide.clientWidth - parseFloat(style.paddingLeft) - parseFloat(style.paddingRight));
    const availableHeight = Math.max(1, slide.clientHeight - parseFloat(style.paddingTop) - parseFloat(style.paddingBottom));
    const contentWidth = Math.max(1, box.scrollWidth);
    const contentHeight = Math.max(1, box.scrollHeight);
    const scale = Math.min(1, availableWidth / contentWidth, availableHeight / contentHeight) * .975;
    box.style.transform = "scale(" + scale.toFixed(5) + ")";
    slide.dataset.fitScale = scale.toFixed(5);

    const content = box.getBoundingClientRect();
    const bounds = slide.getBoundingClientRect();
    const safeLeft = bounds.left + parseFloat(style.paddingLeft) - 1;
    const safeRight = bounds.right - parseFloat(style.paddingRight) + 1;
    const safeTop = bounds.top + parseFloat(style.paddingTop) - 1;
    const safeBottom = bounds.bottom - parseFloat(style.paddingBottom) + 1;
    const fits = content.left >= safeLeft && content.right <= safeRight && content.top >= safeTop && content.bottom <= safeBottom;
    slide.dataset.fits = String(fits);
    return { scale, fits };
  }

  function show(nextIndex) {
    nextIndex = Math.max(0, Math.min(slides.length - 1, nextIndex));
    slides[index]?.classList.remove("active");
    index = nextIndex;
    slides[index]?.classList.add("active");
    pager.textContent = String(index + 1).padStart(2, "0") + " / " + String(slides.length).padStart(2, "0");
    metaFooter.hidden = index !== 0;
    body.dataset.current = slides[index]?.dataset.emphasis === "true" || slides[index]?.dataset.cover === "true" ? "emphasis" : "theme";
    requestAnimationFrame(() => fitSlide(slides[index]));
  }

  function fullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }

  document.addEventListener("keydown", (event) => {
    if (["ArrowRight", "ArrowDown", " ", "Enter", "j", "PageDown"].includes(event.key)) {
      event.preventDefault();
      show(index + 1);
    } else if (["ArrowLeft", "ArrowUp", "k", "PageUp"].includes(event.key)) {
      event.preventDefault();
      show(index - 1);
    } else if (event.key === "Home") {
      event.preventDefault();
      show(0);
    } else if (event.key === "End") {
      event.preventDefault();
      show(slides.length - 1);
    } else if (event.key === "f" || event.key === "F") {
      event.preventDefault();
      fullscreen();
    }
  });

  let touchX = null;
  document.addEventListener("touchstart", (event) => {
    touchX = event.touches[0]?.clientX ?? null;
  }, { passive: true });
  document.addEventListener("touchend", (event) => {
    if (touchX == null) return;
    const dx = (event.changedTouches[0]?.clientX ?? touchX) - touchX;
    if (dx < -40) show(index + 1);
    else if (dx > 40) show(index - 1);
    touchX = null;
  }, { passive: true });

  document.addEventListener("click", (event) => {
    if (event.target.closest?.(".deck-footer")) return;
    show(event.clientX > innerWidth / 2 ? index + 1 : index - 1);
  });

  const refit = () => requestAnimationFrame(() => fitSlide(slides[index]));
  window.addEventListener("resize", refit);
  document.addEventListener("fullscreenchange", refit);
  document.fonts?.ready.then(refit);
  if ("ResizeObserver" in window) new ResizeObserver(refit).observe(stage);

  window.__DECK_AUDIT = {
    templateVersion: body.dataset.templateVersion,
    title: document.title,
    slideCount: slides.length,
    activeIndex: () => index,
    show,
    fitCurrent: () => fitSlide(slides[index]),
    currentLayout: () => ({
      lineCount: slides[index]?.dataset.lineCount,
      density: slides[index]?.dataset.density,
      layout: slides[index]?.dataset.layout,
      fitScale: slides[index]?.dataset.fitScale,
      fits: slides[index]?.dataset.fits
    }),
    footerState: () => ({ index, metaHidden: metaFooter.hidden, pager: pager.textContent }),
    renderMathAware
  };

  show(0);
</script>
</body>
</html>
